backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "portfolio"
    label: "作品集"
    folder: "_portfolio"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "作品名稱", name: "title", widget: "string" }
      - { label: "分類", name: "category", widget: "select", options: ["婚禮", "活動", "抓周", "個人寫真"] }
      - { label: "客戶名稱", name: "client", widget: "string", required: false }
      - { label: "拍攝日期", name: "date", widget: "date" }
      - { label: "封面照片", name: "cover", widget: "image" }
      - { label: "照片集", name: "photos", widget: "list", field: { label: "照片", name: "photo", widget: "image" } }
      - { label: "描述", name: "description", widget: "text", required: false }
      - { label: "發布", name: "published", widget: "boolean", default: true }
