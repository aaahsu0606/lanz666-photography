<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="藍六六攝影｜作品集｜婚禮紀錄、活動紀錄、抓周紀錄、個人寫真｜台灣">
<title>作品集 — 藍六六攝影</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+TC:wght@300;400;700&family=Special+Elite&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
:root{--cream:#f5f0e8;--dark:#1a1208;--warm:#3d2b1f;--tan:#b89a72;--ltan:#d4bb99;--faded:#7a6a55;--border:rgba(61,43,31,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--cream);color:var(--dark);font-family:'Noto Serif TC',serif;cursor:crosshair;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");opacity:0.05;pointer-events:none;z-index:9999;}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;justify-content:space-between;align-items:center;padding:1.1rem 4rem;background:rgba(245,240,232,0.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);transition:all 0.3s;}
.logo{font-family:'Special Elite',monospace;font-size:1.2rem;letter-spacing:0.08em;color:var(--dark);text-decoration:none;}
.logo span{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.72rem;display:block;letter-spacing:0.4em;color:var(--faded);margin-top:-3px;}
nav{display:flex;gap:2rem;align-items:center;}
nav a{font-family:'Special Elite',monospace;font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--warm);text-decoration:none;border-bottom:1px solid transparent;transition:all 0.3s;cursor:crosshair;padding-bottom:2px;}
nav a:hover,nav a.active{color:var(--dark);border-bottom-color:var(--tan);}
.nav-cta{background:var(--dark)!important;color:var(--cream)!important;padding:0.5rem 1.3rem!important;border:none!important;transition:opacity 0.3s!important;}
.nav-cta:hover{opacity:0.8;}

/* HERO FULL */
.hero-full{position:relative;height:100vh;overflow:hidden;display:flex;align-items:flex-end;}
.hero-full img.hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,7,3,0.85) 0%,rgba(10,7,3,0.3) 50%,transparent 100%);}
.hero-content{position:relative;z-index:2;padding:0 4rem 5rem;max-width:800px;}
.hero-eyebrow{font-family:'Special Elite',monospace;font-size:0.65rem;letter-spacing:0.5em;color:var(--ltan);margin-bottom:1.2rem;opacity:0.8;}
.hero-content h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,6vw,5.5rem);font-weight:300;line-height:1.1;color:#f5f0e8;margin-bottom:1.5rem;}
.hero-content h1 em{font-style:italic;color:var(--ltan);}
.hero-content p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:rgba(245,240,232,0.65);margin-bottom:2rem;line-height:1.8;max-width:500px;}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;}
.btn-light{font-family:'Special Elite',monospace;font-size:0.68rem;letter-spacing:0.3em;padding:0.85rem 2rem;background:var(--cream);color:var(--dark);border:1px solid var(--cream);text-decoration:none;transition:all 0.3s;cursor:crosshair;}
.btn-light:hover{background:transparent;color:var(--cream);}
.btn-outline-light{font-family:'Special Elite',monospace;font-size:0.68rem;letter-spacing:0.3em;padding:0.85rem 2rem;background:transparent;color:var(--cream);border:1px solid rgba(245,240,232,0.5);text-decoration:none;transition:all 0.3s;cursor:crosshair;}
.btn-outline-light:hover{border-color:var(--ltan);color:var(--ltan);}
.hero-scroll{position:absolute;bottom:2rem;right:4rem;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:'Special Elite',monospace;font-size:0.58rem;letter-spacing:0.3em;color:rgba(245,240,232,0.4);animation:breathe 2.5s ease-in-out infinite;}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,rgba(245,240,232,0.4),transparent);}
@keyframes breathe{0%,100%{opacity:0.4;}50%{opacity:0.9;}}

/* SECTION BASE */
section{padding:6rem 4rem;}
.sec-eyebrow{font-family:'Special Elite',monospace;font-size:0.62rem;letter-spacing:0.5em;color:var(--tan);display:block;margin-bottom:1rem;text-align:center;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:300;text-align:center;color:var(--dark);margin-bottom:0.5rem;}
.sec-title em{font-style:italic;color:var(--tan);}
.sec-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--faded);text-align:center;margin-bottom:3.5rem;}
.sec-divider{width:60px;height:1px;background:var(--tan);margin:0 auto 3.5rem;}

/* SERVICES OVERVIEW */
.services-overview{background:var(--dark);}
.services-overview .sec-title{color:var(--cream);}
.services-overview .sec-eyebrow{color:var(--tan);}
.services-overview .sec-sub{color:rgba(245,240,232,0.5);}
.services-overview .sec-divider{background:rgba(184,154,114,0.4);}
.svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(184,154,114,0.15);}
.svc-item{background:var(--dark);padding:2.5rem 2rem;position:relative;overflow:hidden;transition:background 0.35s;}
.svc-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--tan);transform:scaleX(0);transform-origin:left;transition:transform 0.4s;}
.svc-item:hover{background:rgba(184,154,114,0.07);}
.svc-item:hover::before{transform:scaleX(1);}
.svc-num{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:3rem;color:rgba(184,154,114,0.25);line-height:1;margin-bottom:1rem;}
.svc-name{font-family:'Special Elite',monospace;font-size:0.72rem;letter-spacing:0.3em;color:var(--cream);margin-bottom:0.8rem;}
.svc-desc{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.95rem;color:rgba(245,240,232,0.45);line-height:1.8;}
.svc-link{display:inline-block;margin-top:1.5rem;font-family:'Special Elite',monospace;font-size:0.58rem;letter-spacing:0.3em;color:var(--tan);text-decoration:none;border-bottom:1px solid rgba(184,154,114,0.3);padding-bottom:2px;transition:border-color 0.3s;}
.svc-link:hover{border-color:var(--tan);}

/* ABOUT STRIP */
.about-strip{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:600px;}
.about-img{position:relative;overflow:hidden;}
.about-img img{width:100%;height:100%;object-fit:contain;object-position:center;filter:sepia(0.1);}
.about-img-overlay{position:absolute;inset:0;background:rgba(26,18,8,0.1);}
.about-text-block{background:var(--warm);padding:5rem 4rem;display:flex;flex-direction:column;justify-content:center;}
.about-text-block .sec-eyebrow{text-align:left;}
.about-text-block .sec-title{text-align:left;color:var(--cream);font-size:2.4rem;}
.about-text-block .sec-title em{color:var(--ltan);}
.about-text-block p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:rgba(245,240,232,0.65);line-height:2;margin-bottom:1rem;}
.about-text-block p.hl{border-left:2px solid var(--tan);padding-left:1.2rem;color:var(--ltan);font-size:1.05rem;}
.gear-tags{display:flex;flex-wrap:wrap;gap:0.6rem;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid rgba(184,154,114,0.2);}
.gear-tag{font-family:'Special Elite',monospace;font-size:0.58rem;letter-spacing:0.2em;color:rgba(245,240,232,0.3);padding:0.3rem 0.7rem;border:1px solid rgba(184,154,114,0.2);transition:all 0.3s;}
.gear-tag:hover{color:var(--tan);border-color:rgba(184,154,114,0.5);}

/* GALLERY PREVIEW */
.gallery-preview{background:var(--cream);}
.preview-grid{columns:3;column-gap:1rem;}
.preview-card{break-inside:avoid;margin-bottom:1rem;overflow:hidden;cursor:zoom-in;position:relative;}
.preview-card img{width:100%;height:auto;display:block;filter:sepia(0.08) contrast(1.04);transition:transform 0.4s,filter 0.4s;}
.preview-card:hover img{filter:sepia(0) contrast(1.08);transform:scale(1.02);}
.preview-card::after{content:attr(data-label);position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(26,18,8,0.8),transparent);color:var(--ltan);font-family:'Special Elite',monospace;font-size:0.58rem;letter-spacing:0.25em;padding:1.5rem 0.8rem 0.6rem;opacity:0;transition:opacity 0.3s;}
.preview-card:hover::after{opacity:1;}
.gallery-cta{text-align:center;margin-top:3rem;}

/* PRICING */
.pricing{background:var(--cream);}
.pricing-tabs{display:flex;justify-content:center;gap:0;border:1px solid var(--border);width:fit-content;margin:0 auto 3rem;}
.ptab{font-family:'Special Elite',monospace;font-size:0.65rem;letter-spacing:0.2em;padding:0.7rem 1.8rem;border:none;background:transparent;color:var(--faded);cursor:crosshair;transition:all 0.25s;border-right:1px solid var(--border);}
.ptab:last-child{border-right:none;}
.ptab:hover{color:var(--dark);}
.ptab.active{background:var(--dark);color:var(--cream);}
.pricing-panel{display:none;}
.pricing-panel.active{display:block;}
.pricing-inner{max-width:860px;margin:0 auto;}
.pricing-header{text-align:center;margin-bottom:2.5rem;}
.pricing-header h3{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--dark);margin-bottom:0.5rem;}
.pricing-header p{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--faded);font-size:0.95rem;}
.plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-bottom:2.5rem;}
.plan-card{border:1px solid var(--border);padding:2rem 1.5rem;text-align:center;position:relative;transition:all 0.3s;}
.plan-card:hover{border-color:var(--tan);transform:translateY(-4px);}
.plan-card.featured{border-color:var(--tan);background:rgba(184,154,114,0.05);}
.plan-card.featured::before{content:'推薦';position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--tan);color:var(--dark);font-family:'Special Elite',monospace;font-size:0.55rem;letter-spacing:0.2em;padding:0.25rem 0.8rem;}
.plan-label{font-family:'Special Elite',monospace;font-size:0.65rem;letter-spacing:0.3em;color:var(--tan);margin-bottom:0.5rem;}
.plan-hours{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--faded);margin-bottom:1rem;}
.plan-price{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;color:var(--dark);line-height:1;}
.plan-price span{font-size:1rem;color:var(--faded);}
.pricing-details{border-top:1px solid var(--border);padding-top:2rem;}
.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;}
.detail-block h4{font-family:'Special Elite',monospace;font-size:0.62rem;letter-spacing:0.3em;color:var(--tan);margin-bottom:1rem;}
.detail-block ul{list-style:none;}
.detail-block li{font-family:'Cormorant Garamond',serif;font-size:0.95rem;color:var(--faded);padding:0.4rem 0;border-bottom:1px solid var(--border);display:flex;gap:0.5rem;line-height:1.5;}
.detail-block li::before{content:'·';color:var(--tan);flex-shrink:0;}
.pricing-note{background:rgba(184,154,114,0.06);border:1px solid rgba(184,154,114,0.2);padding:1.5rem 2rem;margin-top:2rem;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.92rem;color:var(--faded);line-height:1.8;text-align:center;}

/* CONTACT */
.contact-section{background:var(--dark);}
.contact-section .sec-title{color:var(--cream);}
.contact-section .sec-eyebrow,.contact-section .sec-sub{color:var(--tan);opacity:1;}
.contact-section .sec-divider{background:rgba(184,154,114,0.3);}
.contact-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:5rem;max-width:1000px;margin:0 auto;align-items:start;}
.contact-info h3{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--cream);margin-bottom:1.5rem;}
.contact-info p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.95rem;color:rgba(245,240,232,0.55);line-height:1.9;margin-bottom:2rem;}
.contact-links{display:flex;flex-direction:column;gap:1rem;}
.contact-link{font-family:'Special Elite',monospace;font-size:0.65rem;letter-spacing:0.25em;color:var(--tan);text-decoration:none;display:flex;align-items:center;gap:0.8rem;transition:color 0.3s;}
.contact-link::before{content:'→';font-size:0.7rem;}
.contact-link:hover{color:var(--ltan);}
.form-field{margin-bottom:1.5rem;}
.form-field label{display:block;font-family:'Special Elite',monospace;font-size:0.6rem;letter-spacing:0.3em;color:var(--tan);margin-bottom:0.6rem;}
.form-field input,.form-field textarea,.form-field select{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(184,154,114,0.25);padding:0.6rem 0;font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--cream);outline:none;transition:border-color 0.3s;-webkit-appearance:none;appearance:none;}
.form-field input::placeholder,.form-field textarea::placeholder{color:rgba(245,240,232,0.2);}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{border-bottom-color:var(--tan);}
.form-field select option{background:var(--dark);color:var(--cream);}
.form-field textarea{resize:none;height:100px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}
.submit-btn{font-family:'Special Elite',monospace;font-size:0.68rem;letter-spacing:0.35em;padding:1rem 2.5rem;background:var(--tan);color:var(--dark);border:1px solid var(--tan);cursor:crosshair;transition:all 0.3s;margin-top:0.5rem;}
.submit-btn:hover{background:transparent;color:var(--tan);}

/* FOOTER */
.site-footer{background:var(--dark);border-top:1px solid rgba(184,154,114,0.15);padding:2rem 4rem;display:flex;justify-content:space-between;align-items:center;}
.footer-logo{font-family:'Special Elite',monospace;font-size:1rem;letter-spacing:0.1em;color:rgba(245,240,232,0.3);}
.footer-links{display:flex;gap:2rem;}
.footer-links a{font-family:'Special Elite',monospace;font-size:0.58rem;letter-spacing:0.3em;color:rgba(245,240,232,0.25);text-decoration:none;transition:color 0.3s;cursor:crosshair;}
.footer-links a:hover{color:var(--tan);}
.footer-copy{font-family:'Special Elite',monospace;font-size:0.55rem;letter-spacing:0.2em;color:rgba(245,240,232,0.2);}

/* LIGHTBOX */
.lb-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(10,7,3,0.96);align-items:center;justify-content:center;cursor:zoom-out;}
.lb-overlay.open{display:flex;}
.lb-img-wrap{position:relative;max-width:90vw;max-height:90vh;display:flex;align-items:center;justify-content:center;}
.lb-overlay img{max-width:88vw;max-height:88vh;object-fit:contain;display:block;cursor:default;}
.lb-close{position:fixed;top:1.5rem;right:2rem;font-family:'Special Elite',monospace;font-size:0.75rem;letter-spacing:0.2em;color:rgba(245,240,232,0.4);background:none;border:none;cursor:pointer;transition:color 0.3s;z-index:9010;}
.lb-close:hover{color:var(--tan);}
.lb-prev,.lb-next{position:fixed;top:50%;transform:translateY(-50%);font-family:'Special Elite',monospace;font-size:1.2rem;color:rgba(245,240,232,0.35);background:none;border:none;cursor:pointer;transition:color 0.3s;z-index:9010;padding:1rem;}
.lb-prev{left:1.5rem;}.lb-next{right:1.5rem;}
.lb-prev:hover,.lb-next:hover{color:var(--tan);}
.lb-counter{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);font-family:'Special Elite',monospace;font-size:0.6rem;letter-spacing:0.4em;color:rgba(245,240,232,0.3);z-index:9010;}

/* UTILS */
.btn-primary{font-family:'Special Elite',monospace;font-size:0.68rem;letter-spacing:0.3em;padding:0.85rem 2rem;background:var(--dark);color:var(--cream);border:1px solid var(--dark);text-decoration:none;transition:all 0.3s;cursor:crosshair;display:inline-block;}
.btn-primary:hover{background:transparent;color:var(--dark);}
.btn-secondary{font-family:'Special Elite',monospace;font-size:0.68rem;letter-spacing:0.3em;padding:0.85rem 2rem;background:transparent;color:var(--warm);border:1px solid var(--border);text-decoration:none;transition:all 0.3s;cursor:crosshair;display:inline-block;}
.btn-secondary:hover{border-color:var(--tan);color:var(--dark);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fadeUp 0.9s ease both;}
.fi2{animation:fadeUp 0.9s 0.15s ease both;}
.fi3{animation:fadeUp 0.9s 0.3s ease both;}
.fi4{animation:fadeUp 0.9s 0.45s ease both;}
</style>
<style>
.dynamic-card {
  break-inside:avoid; margin-bottom:1.2rem;
  overflow:hidden; cursor:zoom-in; position:relative;
  transition:transform 0.35s;
}
.dynamic-card:hover { transform:translateY(-4px); }
.dynamic-card img {
  width:100%; height:auto; display:block;
  filter:sepia(0.08) contrast(1.04);
  transition:transform 0.4s, filter 0.4s;
}
.dynamic-card:hover img { filter:sepia(0) contrast(1.08); transform:scale(1.02); }
.card-overlay {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(to top, rgba(26,18,8,0.85), transparent);
  color:var(--light-tan); font-family:'Special Elite',monospace;
  font-size:0.6rem; letter-spacing:0.25em;
  padding:1.5rem 0.8rem 0.6rem;
  opacity:0; transition:opacity 0.3s;
}
.dynamic-card:hover .card-overlay { opacity:1; }
.tab-btn {
  font-family:'Special Elite',monospace; font-size:0.68rem; letter-spacing:0.2em;
  padding:0.6rem 1.3rem; border:none; background:transparent;
  color:var(--faded); cursor:crosshair; border-right:1px solid var(--border);
  transition:all 0.25s;
}
.tab-btn:last-child { border-right:none; }
.tab-btn:hover { color:var(--dark); }
.tab-btn.active { background:var(--dark); color:var(--cream); }
.sub-tab-btn {
  font-family:'Special Elite',monospace; font-size:0.65rem; letter-spacing:0.2em;
  padding:0.5rem 1.1rem; border:none; background:transparent;
  color:var(--faded); cursor:crosshair; border-right:1px solid var(--border);
  transition:all 0.25s;
}
.sub-tab-btn:last-child { border-right:none; }
.sub-tab-btn.active { background:var(--warm); color:var(--cream); }
.empty-state {
  text-align:center; padding:5rem 2rem; color:var(--faded);
  font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.1rem;
}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">藍六六<span>photography</span></a>
  <nav><a href="index.html" >首頁</a>
<a href="services.html" >服務項目</a>
<a href="gallery.html" class="active">作品集</a>
<a href="about.html" >關於我</a>
<a href="contact.html" class="nav-cta ">聯絡</a>
</nav>
</header>

<div style="padding-top:80px;"></div>
<section style="padding:4rem 4rem 2rem; border-bottom:1px solid var(--border);">
  <span style="font-family:'Special Elite',monospace;font-size:0.62rem;letter-spacing:0.5em;color:var(--tan);display:block;margin-bottom:1rem;text-align:center;">PORTFOLIO</span>
  <h1 style="font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:300;text-align:center;color:var(--dark);margin-bottom:0.5rem;"><em style="font-style:italic;color:var(--tan);">作品集</em></h1>
  <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--faded);text-align:center;margin-bottom:2rem;">每一張照片，都是時間留下的痕跡</p>
  <div style="width:60px;height:1px;background:var(--tan);margin:0 auto;"></div>
</section>

<section style="padding:3rem 4rem;">
  <!-- 主分類 -->
  <div style="display:flex;border:1px solid var(--border);width:fit-content;margin-bottom:1.5rem;" id="main-tabs">
    <button class="tab-btn active" onclick="filterMain('all',this)">全部</button>
    <button class="tab-btn" onclick="filterMain('wedding',this)">婚禮</button>
    <button class="tab-btn" onclick="filterMain('event',this)">活動</button>
    <button class="tab-btn" onclick="filterMain('baby',this)">抓周</button>
    <button class="tab-btn" onclick="filterMain('portrait',this)">個人寫真</button>
  </div>

  <!-- 子系列 -->
  <div id="sub-tabs" style="display:none; margin-bottom:1.5rem;">
    <div style="font-family:'Special Elite',monospace;font-size:0.58rem;letter-spacing:0.35em;color:var(--tan);margin-bottom:0.6rem;">作品系列</div>
    <div style="display:flex;border:1px solid var(--border);width:fit-content;" id="sub-tabs-inner"></div>
  </div>

  <div style="font-family:'Special Elite',monospace;font-size:0.65rem;letter-spacing:0.3em;color:var(--tan);margin-bottom:2rem;" id="photo-count"></div>

  <div style="columns:3;column-gap:1.2rem;" id="photo-grid"></div>
</section>

<!-- Lightbox -->
<div class="lb-overlay" id="lb-overlay" onclick="lbClose(event)">
  <div class="lb-img-wrap"><img id="lb-img" src="" alt=""></div>
  <button class="lb-close" onclick="closeLb()">✕ CLOSE</button>
  <button class="lb-prev" onclick="lbNav(-1);event.stopPropagation()">&#8592;</button>
  <button class="lb-next" onclick="lbNav(1);event.stopPropagation()">&#8594;</button>
  <div class="lb-caption" id="lb-caption"></div>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<footer class="site-footer">
  <div class="footer-logo">藍六六 PHOTOGRAPHY</div>
  <div class="footer-links">
    <a href="index.html">首頁</a>
    <a href="services.html">服務項目</a>
    <a href="gallery.html">作品集</a>
    <a href="about.html">關於我</a>
    <a href="contact.html">聯絡</a>
  </div>
  <div class="footer-copy">© 2024 藍六六 PHOTOGRAPHY · 台灣</div>
</footer>

<script>
// ── 作品資料庫 ──
// 每次上傳新作品後，把照片網址加到這裡
const PORTFOLIO = [
  {
    series:'測試',
    category:'wedding',
    location:'高雄',
    photos:[
    'https://res.cloudinary.com/dnsvfpj6m/image/upload/v1778075601/jqeefcgdqtx43zdcqvrl.jpg',
    'https://res.cloudinary.com/dnsvfpj6m/image/upload/v1778075601/u7qalfdt2utvmewwn1yu.jpg',
    'https://res.cloudinary.com/dnsvfpj6m/image/upload/v1778075601/e6fibjcqqe2issirsi1k.jpg',
    'https://res.cloudinary.com/dnsvfpj6m/image/upload/v1778075601/bidehdidamoxow0nhxpb.jpg',
    'https://res.cloudinary.com/dnsvfpj6m/image/upload/v1778075601/we1eo92pukfwxkcgvwgy.jpg',
    'https://res.cloudinary.com/dnsvfpj6m/image/upload/v1778075602/yynaqkq6ojnoiuqrwxqv.jpg',
    'https://res.cloudinary.com/dnsvfpj6m/image/upload/v1778075601/mgxcdbgi7qqyx7crnzts.jpg',
    'https://res.cloudinary.com/dnsvfpj6m/image/upload/v1778075603/suhem6uckwhyyg9rlfkz.jpg',
    'https://res.cloudinary.com/dnsvfpj6m/image/upload/v1778075603/cfrrt8oeklwn39jv0jrn.jpg'
    ]
  },
];

// ── 以下為自動邏輯，不需要修改 ──
let allPhotos = [];
let currentCat = 'all';
let currentSub = 'all';
let lbPhotos = [], lbIdx = 0;

function buildPhotos() {
  allPhotos = [];
  PORTFOLIO.forEach(function(s) {
    (s.photos || []).forEach(function(url) {
      allPhotos.push({ url:url, category:s.category, series:s.series, location:s.location||'' });
    });
  });
}

function buildSubTabs() {
  const inner = document.getElementById('sub-tabs-inner');
  const portraitSeries = PORTFOLIO.filter(function(s){ return s.category==='portrait'; });
  let html = '<button class="sub-tab-btn active" onclick="filterSub('all',this)">全部作品</button>';
  portraitSeries.forEach(function(s) {
    html += '<button class="sub-tab-btn" onclick="filterSub('' + s.series.replace(/'/g,"\'") + '',this)">' + s.series + '</button>';
  });
  inner.innerHTML = html;
}

function renderPhotos(photos) {
  const grid = document.getElementById('photo-grid');
  const count = document.getElementById('photo-count');
  lbPhotos = photos;
  if (!photos.length) {
    grid.innerHTML = '<div class="empty-state">此分類暫無作品。</div>';
    count.textContent = '';
    return;
  }
  count.textContent = photos.length + ' 張作品';
  grid.innerHTML = photos.map(function(p,i) {
    return '<div class="dynamic-card" onclick="openLb(' + i + ')">' +
      '<img src="' + p.url + '" alt="' + p.series + '" loading="lazy">' +
      '<div class="card-overlay">' + p.series + (p.location?' · '+p.location:'') + '</div>' +
      '</div>';
  }).join('');
}

function filterMain(cat, btn) {
  currentCat = cat; currentSub = 'all';
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var subEl = document.getElementById('sub-tabs');
  if (cat === 'portrait') {
    subEl.style.display = 'block';
    document.querySelectorAll('.sub-tab-btn').forEach(function(b,i){ b.classList.toggle('active',i===0); });
  } else {
    subEl.style.display = 'none';
  }
  applyFilter();
}

function filterSub(sub, btn) {
  currentSub = sub;
  document.querySelectorAll('.sub-tab-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  var filtered = allPhotos.filter(function(p) {
    var catOk = currentCat==='all' || p.category===currentCat;
    var subOk = currentSub==='all' || p.series===currentSub;
    return catOk && subOk;
  });
  renderPhotos(filtered);
}

function openLb(idx) { lbIdx=idx; showLb(); document.getElementById('lb-overlay').classList.add('open'); document.body.style.overflow='hidden'; }
function showLb() { if(!lbPhotos.length)return; document.getElementById('lb-img').src=lbPhotos[lbIdx].url; document.getElementById('lb-caption').textContent=lbPhotos[lbIdx].series||''; document.getElementById('lb-counter').textContent=(lbIdx+1)+' / '+lbPhotos.length; }
function lbNav(dir) { lbIdx=(lbIdx+dir+lbPhotos.length)%lbPhotos.length; showLb(); }
function closeLb() { document.getElementById('lb-overlay').classList.remove('open'); document.body.style.overflow=''; }
function lbClose(e) { if(e.target===document.getElementById('lb-overlay'))closeLb(); }
document.addEventListener('keydown',function(e){ var o=document.getElementById('lb-overlay'); if(!o||!o.classList.contains('open'))return; if(e.key==='ArrowLeft')lbNav(-1); if(e.key==='ArrowRight')lbNav(1); if(e.key==='Escape')closeLb(); });

buildPhotos();
buildSubTabs();
renderPhotos(allPhotos);

if(window.netlifyIdentity){window.netlifyIdentity.on("init",function(user){if(!user){window.netlifyIdentity.on("login",function(){document.location.href="/admin/";});}});}
</script>
</body>
</html>
